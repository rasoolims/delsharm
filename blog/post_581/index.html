    </script><link rel="stylesheet" href="/delsharm/_astro/global.ntcYPbXE.css"></head><body><div class="single-post-container"><div class="page-header" style="margin-bottom: 30px;"><button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button><h1><a href="/delsharm/" style="color: inherit; text-decoration: none;">دلشرم</a></h1><p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;">محمدصادق رسولی</p></div><a href="/delsharm/" style="display: inline-block; margin-bottom: 20px; font-weight: bold;">← بازگشت به صفحه اصلی</a><h2 style="border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 10px;">سیاه‌مشق ۸</h2><div class="date" style="color: var(--text-muted); font-size: 0.9em; margin-bottom: 20px;">۲۷ خرداد ۱۳۸۸</div><div class="post-content-body"><div class="postbody"><meta content="text/html; charset=utf-8" http-equiv="Content-Type"/><meta content="Word.Document" name="ProgId"/><meta content="Microsoft Word 12" name="Generator"/><meta content="Microsoft Word 12" name="Originator"/><link href="file:///C:\DOCUME~1\user\LOCALS~1\Temp\msohtmlclip1\01\clip_themedata.thmx" rel="themeData"/><link href="file:///C:\DOCUME~1\user\LOCALS~1\Temp\msohtmlclip1\01\clip_colorschememapping.xml" rel="colorSchemeMapping"/><!--[if gte mso 9]><![endif]--><!--[if gte mso 9]><![endif]--><!--[if gte mso 10]>
<p>&lt;![endif]–&gt;</p>
<p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">ببین تو عزّت لات و منات و عُزّی را </span></p>
<p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">تبر ز دست تو دلخور شده‌ست ابراهیم</span><sup><span lang="FA" style=" " tahoma","sans-serif";"="">*</span></sup></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" " tahoma","sans-serif";"="">آی ابراهیم! بسیار بزرگ
انگاشتی‌ام که تبر بر دوش بتی نهادی و رفتی. هیچ آیا انگار نکردی که آن صنم را خدا
بینگارم؟ ابراهیم، این‌جا پر از بت‌هایی است که تبر بر دوش‌شان نهاده شده و حال آن‌که
من شکسته‌ترینم. ابراهیم، یادم رفت که تبر بهانه بود و باید خدا را در تبار دیگری جُست.
ولی آن‌قدر میان خدایان سنگی و چوبی لولیدم که دیگر خود را نیز از یاد بردم. </span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" " tahoma","sans-serif";"="">هر روز بت‌هایی را در
خود می‌سازم. برخی را می‌شکنی و تبر را بر دوش آن بزرگ‌تر می‌نهی و هیچ نمی‌گویی
این دیوانه، آن‌قدرها در ژرفای کنایه‌هایت غور نکرده است که این همه را بفهمد.
ابراهیم، از شهر دلم نرو. بمان ابراهیم. آتش دلم را گلستان کن، ابراهیم. جای آن‌که
بت‌ها را بشکنی، دلم را بشکن. ولی چندی‌ست تبر را بر دوشم نهادی و رفتی. و من دیدم
تبری را بر دوش خویش و خود را پرستیدم. آی ابراهیم! رفتی و تنهایم گذاشتی؟! نه؛
مرا باور نمی‌آید. </span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" " tahoma","sans-serif";"="">دلم را دیرزمانی‌ست بر
طاقچۀ عادت جاگذاشته‌ام. برگیرش، بشکنش، بسوزانش. ابراهیم، مرا با خود از این ظلمت‌کده
ببر. مرا به حوالی باران زمزم، تا کعبۀ نگاهت برسان. تبر را بردار و بر دوش آسمان
بنه. با خویشتنم تنهایم مگذار. مگذار در تنهایی‌ام بمیرم. آی ابراهیم...</span></p>
<p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">شنبه 23 خرداد 1388</span></p>
<p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span 0);"="" 153,="" "" lang="FA" rgb(255,="" style=" " tahoma","sans-serif";=""><span style="">****</span></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><sup style=""><span lang="FA" style=" " tahoma","sans-serif";"="">*</span></sup><span lang="FA" style=" " tahoma","sans-serif";"="">بیتی است از غزلی از <a href="https://web.archive.org/web/20120721104547/http://banooyeshereshohada.blogfa.com/"><span style="">پروانه نجاتی</span></a> با مطلع
"زمین ز بت‌کده‌ها پر شده‌ست ابراهیم / دوباره دور تفاخر شده‌ست
ابراهیم".</span><span dir="ltr" style=" " tahoma","sans-serif";"=""></span></p>
<p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span 102,="" 255);"="" "" lang="FA" rgb(51,="" style=" " tahoma","sans-serif";=""><span style="">****</span></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">پی‌نوشت
(متن‌هایی بر یک حاشیه):</span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">من باز به همۀ
این آقایانی كه می‌خواهند نطق كنند و اعلامیه بدهند و نمی‌دانم نامۀ سرگشاده
بفرستند و از این مزخرفات، به همۀ این‌ها اعلام می‌كنم كه برگردید به اسلام، برگردید
به قانون، برگردید به قرآن كریم،‌ بهانه درست نكنید كه اسباب این بشود كه شما همه
به انزوا كشیده بشوید. من به بسیاری از شما علاقه دارم و میل دارم كه همه به قانون
عمل كنند و همه در جای خود باشند و چنان‌چه این‌طور نباشد،‌ مسئله طور دیگر خواهد
شد</span><span dir="ltr" style=" " tahoma","sans-serif";"="">.</span><span lang="FA" style=" " tahoma","sans-serif";"=""></span></p>
<p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">صحیفۀ امام خمینی جلد 14 صفحه 415</span></p>
<p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span 102,="" 255);"="" "" lang="FA" rgb(51,="" style=" " tahoma","sans-serif";=""><span style="">****</span></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" " tahoma","sans-serif";"="">نمی‌شود از شما پذیرفت
كه ما قانون را قبول نداریم. غلط می‌كنی قانون را قبول نداری! قانون تو را قبول
ندارد. نباید از مردم پذیرفت، از كسی پذیرفت، ما شورای نگهبان را قبول نداریم. نمی‌توانی
قبول نداشته باشی. مردم رأی دادند به این‌ها، مردم 16 میلیون تقریبا یا یك قدری بیش‌تر
رای دادن به قانون اساسی. مردم كه به قانون اساسی رأی دادند منتظرند كه قانون اساسی
اجرا بشود؛ هر کس از هرجا صبح بلند می‌شود بگوید من شورای نگهبان را قبول ندارم،‌
من قانون اساسی را قبول ندارم، ‌من مجلس را قبول ندارم، من رئیس‌جمهور را قبول ندارم،
من دولت را قبول ندارم. نه! همه باید مقید به این باشید كه قانون را بپذیرید،‌ ولو
برخلاف رأی شما باشد. باید بپذیرید، برای این‌كه میزان اكثریت است و تشخیص شورای
نگهبان كه این مخالف قانون نیست و مخالف اسلام هم نیست، میزان است كه همه باید بپذیریم</span><span dir="ltr" style=" " tahoma","sans-serif";"="">. </span><span lang="FA" style=" " tahoma","sans-serif";"=""></span></p>
<p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">صحیفۀ امام خمینی جلد 14 صفحه 378</span></p>
<p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span 102,="" 255);"="" "" lang="FA" rgb(51,="" style=" " tahoma","sans-serif";=""><span style="">****</span></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">اگر یك جایی
عمل به قانون شد و یك گروهی در خیابان‌ها بر ضدِّ این عمل بخواهند عرض اندام كنند؛‌
این همان معنای دیكتاتوری است كه مكرر گفته‌ام قدم به قدم پیش می‌رود.‌ این همان دیكتاتوری
است كه به هیتلر مبدل می‌شود انسان. ‌این همان دیكتاتوری است كه به استالین انسان
را مبدل می‌كند. اگر قانون در یك كشوری عمل نشود، كسانی كه می‌خواهند قانون را
بشكنند این‌ها دیكتاتورانی هستند كه به صورت اسلامی پیش آمده‌اند یا به صورت آزادی
و امثال این حرف‌ها. اگر همۀ این آقایان كه ادعای این را می‌كنند كه ما طرفدار
قوانین هستیم، این‌ها با هم بنشینند و قانون را باز كنند و تكلیف را از روی قانون
همه‌شان معین كنند و بعد هم ملتزم باشند كه اگر قانون برخلاف رأی من هم بود من
خاضع‌ام، اگر بر وفاق هم بود من خاضع‌ام، دیگر دعوایی پیش نمی‌آید؛ هیاهو پیش نمی‌آید</span><span dir="ltr" style=" " tahoma","sans-serif";"="">. </span><span lang="FA" style=" " tahoma","sans-serif";"=""></span></p>
<p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">صحیفۀ امام خمینی جلد 14 صفحه 415</span></p>
<p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span 102,="" 255);"="" "" lang="FA" rgb(51,="" style=" " tahoma","sans-serif";=""><span style="">****</span></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">قانون معنایش
این است كه {همه} چیزها {را</span><span dir="ltr" style=" " tahoma","sans-serif";"="">{</span><span lang="FA" style=" " tahoma","sans-serif";"=""> به حسب قانون اسلامی، به حسب قانون
كشوری كه منطبق با قوانین اسلام است، همه را، ‌وظیفه‌شان را قانون معین كرده‌. بعد
از این كه قانون وظیفه را معین كرد، هر کس بخواهد كه بر خلاف او عمل بكند، این یك
دیكتاتوری است كه حالا به صورت مظلومانه پیش آمده است و بعد به صورت قاهرانه پیش
خواهد آمد و بعد این كشور را به تباهی خواهد كشید و این كشور وقتی به تباهی كشیده
شد و این مردم متفرّق و مختلف با هم شدند، این همان وظیفه‌ای است كه برای ابرقدرت‌ها
باید انجام بدهد این آدم انجام داده،‌ ولو خودش نمی فهمد. اگر بفهمد كه دیگر مصیبت
بالاتر است. ‌لكن خودشان ملتفت نیستند</span><span dir="ltr" style=" " tahoma","sans-serif";"="">.</span><span lang="FA" style=" " tahoma","sans-serif";"=""></span></p>
<p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">صحیفۀ امام خمینی جلد 14 صفحه 415</span></p>
<p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"=""><span style="">****</span></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" " tahoma","sans-serif";"="">از کتابهای درسی آن سال‌ها
</span><span dir="ltr" style=" " tahoma","sans-serif";"=""></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" " tahoma","sans-serif";"="">عکس صفحۀ اوّل‌شان یادم
است</span><span dir="ltr" style=" " tahoma","sans-serif";"=""></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" " tahoma","sans-serif";"="">که امیدش به ما دبستانی
ها بود</span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" " tahoma","sans-serif";"="">حالا بزرگ شده‌ایم آقا!</span><span dir="ltr" style=" " tahoma","sans-serif";"=""></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" " tahoma","sans-serif";"="">حال امیدتان چطور است؟</span></p>
<p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed; "><a href="https://web.archive.org/web/20120721104547/http://mmsayyar.blogfa.com/"><span lang="FA" style=" " tahoma","sans-serif";"="">محمّد مهدی سیار (از کتاب "بی‌خوابی عمیق"-
نشر "سورۀ مهر")</span></a></p>
<p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span 102,="" 255);"="" "" lang="FA" rgb(51,="" style=" " tahoma","sans-serif";=""><span style="">****</span></span></p>
<p dir="rtl" style="margin-left: 5pt; text-align: justify; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">رُدّوا الحجر مِن حیث جاءَ، فاِنَّ الشّرَّ لا یدفعُهُ الّا الشّرُّ</span></p>
<p align="right" dir="rtl" style="margin-left: 5pt; text-align: left; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" " tahoma","sans-serif";"="">الحکمه
314، نهج‌البلاغه</span></p>
<p dir="rtl" style="margin-left: 5pt; text-align: justify; direction: rtl; unicode-bidi: embed;"><span "" lang="FA" style=" " tahoma","sans-serif";="" yellow;"=""> </span></p>

                themeBtn.innerHTML = '🌙';
