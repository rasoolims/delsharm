<p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" line-height: 115%; " tahoma","sans-serif";"="">جمعه 5 تیر
1388</span><span dir="ltr" style=" line-height: 115%; " tahoma","sans-serif";"=""></span></p>
<p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span 176,="" 80);"="" "" lang="FA" rgb(0,="" style=" line-height: 115%; " tahoma","sans-serif";=""><span style="">****</span></span><span 176,="" 80);"="" "" dir="ltr" rgb(0,="" style=" line-height: 115%; " tahoma","sans-serif";=""></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed; "><span lang="FA" style=" line-height: 115%; " tahoma","sans-serif";"="">پی‌نوشت (بدون شرح):</span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">قرآن به اين وسيله مؤمنين و مسلمين را بيدار می‏كند كه توجه‏
داشته باشيد در داخل خود شما، از متظاهران به اسلام، افراد و دسته‌جاتی‏ هستند كه
دنبال مقصدها و هدفهای خطرناك می‏باشند، يعنی قرآن می‏خواهد بگويد قصه ساختن اين
" افك " از طرف كسانی كه ساختند روی غفلت و بی‏ توجهی و ولنگاری نبود، روی
منظور و هدف بود، هدف هم بی آبرو ساختن‏ پيغمبر و از اعتبار انداختن پيغمبر بود،
كه به هدفشان نرسيدند.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">قرآن‏ می‏گويد آنها يك دسته به هم وابسته
از ميان خود شما بودند، و بعد می‏گويد اين شری بود كه نتيجه‏اش خير بود، و در واقع
اين شر نبود: "</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">لا تحسبوه شرا لكم بل هو خير لكم »
"، گمان نكنيد كه اين يك حادثه سوئی‏ بود و شكستی برای شما مسلمانان بود، خير،
اين داستان با همه تلخی آن به‏ سود جامعه اسلامی بود.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">حال چرا قرآن اين داستان را خير می‏داند
نه شر و حال آن كه داستان بسيار تلخی بود ؟ داستانی برای مفتضح كردن پيغمبر اكرم‏ ساخته
بودند و روزهای متوالی حدود چهل روز گذشت تا اينكه وحی نازل شد و تدريجا اوضاع
روشن گرديد.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">خدا می‏داند در اين مدت بر پيغمبر اكرم و
نزديكان آن حضرت چه گذشت</span><span dir="ltr" style=" line-height: 115%; " tahoma","sans-serif";"=""> ! </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">اين را به دو دليل قرآن می‏گويد خير است
: يك دليل اينكه اين گروه‏ منافق شناخته شدند. در هر جامعه‏ای يكی از بزرگترين
خطرها اين است كه‏ صفوف مشخص نباشد، افراد مؤمن و افراد منافق همه در يك صف باشند.
تا وقتی كه اوضاع آرام است خطری ندارد.</span><span dir="ltr" style=" line-height: 115%; " tahoma","sans-serif";"=""></span></p>
<p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">يك تكان كه به اجتماع بخورد اجتماع از ناحيه منافقين
بزرگترين صدمه‏ها را می‏بيند. لهذا به واسطه حوادثی كه برای جامعه پيش می‏آيد
باطنها آشكار می‏شود و آزمايش پيش می‏آيد، مؤمنها در صف مؤمنين قرار می‏گيرند و منافقها
پرده نفاقشان دريده می‏شود و در صفی كه شايسته آن هستند قرار می‏گيرند. اين يك خير
بزرگ برای جامعه است.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">آن منافقينی كه اين داستان را جعل كرده
بودند، آنچه برايشان به تعبير قرآن ماند " اثم " بود. "اثم"
يعنی داغ گناه. تا زنده بودند، ديگر اعتبار پيدا نكردند.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">فايده دوم اين بود كه سازندگان داستان،
اين داستان را آگاهانه جعل‏ كردند نه ناآگاهانه، ولی عامه مسلمين نا آگاهانه ابزار
اين " عصبه </span><span dir="ltr" style=" line-height: 115%; " tahoma","sans-serif";"="">"
</span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">قرار گرفتند. اكثريت مسلمين با اينكه مسلمان بودند، با
ايمان و مخلص‏ بودند و غرض و مرضی نداشتند بلندگوی اين " عصبه " قرار
گرفتند ولی از روی عدم آگاهی و عدم توجه، كه خود قرآن مطلب را خوب تشريح می‏كند.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">اين
يك خطر بزرگ است برای يك اجتماع، كه افرادش نا آگاه باشند.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">دشمن اگر زيرك باشد خود اينها را ابزار
عليه خودشان قرار می‏دهد، يك‏ داستان جعل می‏كند، بعد اين داستان را به زبان خود
اينها می‏اندازد، تا خودشان قصه‏ای را كه دشمنشان عليه خودشان جعل كرده بازگو كنند.
اين علتش‏ ناآگاهی است و نبايد مردمی اين‌قدر نا آگاه باشند كه حرفی را كه دشمن‏ ساخته
ندانسته بازگو كنند. حرفی كه دشمن جعل می‏كند وظيفه شما اين است‏ كه همان جا دفنش
كنيد.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">
</span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">اصلا دشمن می‏خواهد اين پخش بشود.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">شما بايد دفنش كنيد و به يك نفر هم
نگوييد، تا به اين وسيله با حربه</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> <strong><span> </span></strong></span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">سكوت
نقشه دشمن را نقش برآب كنيد. فايده دوم اين داستان اين بود كه اشتباهی كه مسلمين</span><span dir="ltr" style=" line-height: 115%; " tahoma","sans-serif";"=""><span>  </span></span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">كردند [مشخص شد]،
يعنی حرفی را كه يك عصبه ( يك جمعيت و يك دسته‏ به هم وابسته ) جعل كردند، ساده
لوحانه و ناآگاهانه از آنها شنيدند و بعد كه به هم رسيدند، گفتند: چنين حرفی شنيدم،
آن يكی گفت: من هم‏ شنيدم، ديگری گفت : نمی‏دانم خدا عالم است، باز اين برای او
نقل كرد و نتيجه اين شد كه جامعه مسلمان، ساده لوحانه و نا آگاهانه بلند گوی يك‏ جمعيت
چند نفری شد.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">اين داستان </span><span dir="ltr" style=" line-height: 115%; " tahoma","sans-serif";"="">" </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">افك</span><span dir="ltr" style=" line-height: 115%; " tahoma","sans-serif";"=""> " </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">كه پيدا شد يك بيدار باش عجيبی
بود.</span><span dir="ltr" lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""> </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">همه‏
چشمها را به هم ماليدند </span><span dir="ltr" style=" line-height: 115%; " tahoma","sans-serif";"="">: </span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"="">از يك طرف آنها را شناختيم و از طرف ديگر
خودمان را شناختيم. ما چرا چنين اشتباه بزرگی را مرتكب شديم، چرا ابزار دست اينها
شديم ؟</span><span dir="ltr" style=" line-height: 115%; " tahoma","sans-serif";"=""> !</span><span lang="AR-SA" style=" line-height: 115%; " tahoma","sans-serif";"=""></span></p>

              // UI Feedback: Success
              btn.innerText = 'دیدگاه شما ثبت شد و پس از تایید نمایش داده می‌شود.';
              btn.style.backgroundColor = '#27ae60'; // Green
              form.reset(); // Clear the text boxes
              
              // Reset the button back to normal after 5 seconds
              setTimeout(() => {
                btn.disabled = false;
                btn.innerText = originalText;
                btn.style.backgroundColor = '';
              }, 5000);
            } else {
              // If Staticman throws an error, show it so we can debug
              const data = await res.json();
              alert("خطا: " + (data.errorCode || 'نامشخص'));
              btn.innerText = originalText;
              btn.style.backgroundColor = '';
              btn.disabled = false;
            }
          } catch (err) {
            alert("خطا در ارتباط با سرور. لطفاً تنظیمات اینترنت خود را بررسی کنید.");
            btn.innerText = originalText;
            btn.style.backgroundColor = '';
            btn.disabled = false;
          }
        });
      }
    </script>
