        <html lang="fa" dir="rtl">

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>

        <body>

                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button>

                    <p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;">محمدصادق رسولی</p>

        <div class="post-card"><a href="../posts/آیا-آمازون-در-حال-تغییر-رمان-است.html"><img src="https://media.newyorker.com/photos/6171bf94b438eac83db81b48/master/w_2240,c_limit/211101_r39263web.jpg" class="card-img" alt="تصویر پست"></a><div class="card-content"><h2><a href="../posts/آیا-آمازون-در-حال-تغییر-رمان-است.html">آیا آمازون در حال تغییر رمان است؟</a></h2><div class="date">۱۴ آبان ۱۴۰۰</div><div class="excerpt-container"><p style="text-align: center;"><a href="https://www.newyorker.com/magazine/2021/11/01/is-amazon-changing-the-novel-everything-and-less">https://www.newyorker.com/magazine/2021/11/01/is-amazon-changing-the-novel-everything-and-less</a></p></div><a href="../posts/آیا-آمازون-در-حال-تغییر-رمان-است.html" class="read-more">ادامه مطلب ←</a></div></div>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        
        function updateIcon() {
            if (document.documentElement.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '☀️';
            } else {
                themeBtn.innerHTML = '🌙';
            }
        }
        
        updateIcon();
        
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            const isDark = document.documentElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        });
    </script>
    
        </body>
        </html>
