
        <!DOCTYPE html>
        <html lang="fa" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <title>پیشنهاد یک داستان کوتاه | دلشــرم</title>
            <link rel="stylesheet" href="../style.css">
            
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    
        </head>
        <body>
            <div class="single-post-container">
                <div class="page-header" style="margin-bottom: 30px;">
                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button>
                    <h1><a href="../index.html" style="color: inherit; text-decoration: none;">دلشــرم</a></h1>
                    <p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;">محمدصادق رسولی</p>
                </div>
                <a href="../index.html" style="display: inline-block; margin-bottom: 20px; font-weight: bold;">← بازگشت به صفحه اصلی</a>
                <h2 style="border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 10px;">پیشنهاد یک داستان کوتاه</h2>
                <div class="date" style="color: var(--text-muted); font-size: 0.9em; margin-bottom: 20px;">۲۱ شهریور ۱۳۹۹</div>
                <div><p><span style="font-size:18px;"><span style="font-family:Verdana,Geneva,sans-serif;">کم پیش می‌آید از داستان کوتاهی خوشم بیاید. <a href="https://www.newyorker.com/magazine/2020/09/07/flashlight">این داستان</a> هفتهٔ پیش در نیویورکر منتشر شده است. زیباست. ظاهراً داستانش به صورت صوتی هم در سایتش موجود است.</span></span></p>
<p> </p>
<p style="text-align: center;"><img alt="" style="width: 600px; height: 830px;" src="https://media.newyorker.com/photos/5f46e3f935b95d90fd7e3d6b/master/w_2560%2Cc_limit/200907_r36970.jpg"></p></div>
                <div class="post-tags"><strong>برچسب‌ها:</strong> <a href="../tags/داستان آمریکایی.html">داستان آمریکایی</a></div>
                
            </div>
            
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        
        function updateIcon() {
            if (document.documentElement.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '☀️';
            } else {
                themeBtn.innerHTML = '🌙';
            }
        }
        
        updateIcon();
        
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            const isDark = document.documentElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        });
    </script>
    
        </body>
        </html>
