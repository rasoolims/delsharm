
        <!DOCTYPE html>
        <html lang="fa" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <title>زیباترین شعر | دلشــرم</title>
            <link rel="stylesheet" href="../style.css?v=2">
            
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    
        </head>
        <body>
            <div class="single-post-container">
                <div class="page-header" style="margin-bottom: 30px;">
                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button>
                    <h1><a href="../index.html" style="color: inherit; text-decoration: none;">دلشــرم</a></h1>
                    <p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;">محمدصادق رسولی</p>
                </div>
                <a href="../index.html" style="display: inline-block; margin-bottom: 20px; font-weight: bold;">← بازگشت به صفحه اصلی</a>
                <h2 style="border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 10px;">زیباترین شعر</h2>
                <div class="date" style="color: var(--text-muted); font-size: 0.9em; margin-bottom: 20px;">۰۷ فروردین ۱۳۹۰</div>
                <div><p style="text-align: center;"><font size="2" face="tahoma,verdana,arial,helvetica,sans-serif">زیباترین شعر</font></p>
<p style="text-align: center;"><font size="2" face="tahoma,verdana,arial,helvetica,sans-serif">چشمان تو بود</font></p>
<p style="text-align: center;"><font size="2" face="tahoma,verdana,arial,helvetica,sans-serif">وقتی که ناگهان</font></p>
<p style="text-align: center;"><font size="2" face="tahoma,verdana,arial,helvetica,sans-serif">در برابر چشمانم سبز شد</font></p>
<p style="text-align: center;"><font size="2" face="tahoma,verdana,arial,helvetica,sans-serif"><br></font></p>
<p style="text-align: center;"><font size="2" face="tahoma,verdana,arial,helvetica,sans-serif" style="">چالوس - 2 فروردین 1390</font></p></div>
                
                
            </div>
            
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        
        function updateIcon() {
            if (document.documentElement.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '☀️';
            } else {
                themeBtn.innerHTML = '🌙';
            }
        }
        
        updateIcon();
        
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            const isDark = document.documentElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        });
    </script>
    
        </body>
        </html>
