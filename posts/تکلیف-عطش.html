
        <!DOCTYPE html>
        <html lang="fa" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <title>تکلیف عطش | دلشــرم</title>
            <link rel="stylesheet" href="../style.css?v=2">
            
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    
        </head>
        <body>
            <div class="single-post-container">
                <div class="page-header" style="margin-bottom: 30px;">
                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button>
                    <h1><a href="../index.html" style="color: inherit; text-decoration: none;">دلشــرم</a></h1>
                    <p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;">محمدصادق رسولی</p>
                </div>
                <a href="../index.html" style="display: inline-block; margin-bottom: 20px; font-weight: bold;">← بازگشت به صفحه اصلی</a>
                <h2 style="border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 10px;">تکلیف عطش</h2>
                <div class="date" style="color: var(--text-muted); font-size: 0.9em; margin-bottom: 20px;">۲۲ دی ۱۳۸۶</div>
                <div><p class="MsoNormal" style="LINE-HEIGHT: 150%; TEXT-ALIGN: center" align="center"><span lang="FA" dir="rtl" style="FONT-SIZE: 9pt;  LINE-HEIGHT: 150%; FONT-FAMILY: Tahoma">آن کودک استوار را باور کن<p></p></span></p>
<p class="MsoNormal" style="LINE-HEIGHT: 150%; TEXT-ALIGN: center" align="center"><span lang="FA" dir="rtl" style="FONT-SIZE: 9pt;  LINE-HEIGHT: 150%; FONT-FAMILY: Tahoma">لب‌تشنۀ بی قرار  را باور کن<p></p></span></p>
<p class="MsoNormal" style="LINE-HEIGHT: 150%; TEXT-ALIGN: center" align="center"><span lang="FA" dir="rtl" style="FONT-SIZE: 9pt;  LINE-HEIGHT: 150%; FONT-FAMILY: Tahoma"><p> </p></span></p>
<p class="MsoNormal" style="LINE-HEIGHT: 150%; TEXT-ALIGN: center" align="center"><span lang="FA" dir="rtl" style="FONT-SIZE: 9pt;  LINE-HEIGHT: 150%; FONT-FAMILY: Tahoma">تکلیف عطش برای او حتمی شد</span></p>
<p class="MsoNormal" style="LINE-HEIGHT: 150%; TEXT-ALIGN: center" align="center"><span lang="FA" dir="rtl" style="FONT-SIZE: 9pt;  LINE-HEIGHT: 150%; FONT-FAMILY: Tahoma"></span><span lang="FA" dir="rtl" style="FONT-SIZE: 9pt;  LINE-HEIGHT: 150%; FONT-FAMILY: Tahoma">شش‌ماهۀ روزه‌دار را باور کن<p></p></span></p>
<p class="MsoNormal" style="LINE-HEIGHT: 150%; TEXT-ALIGN: center" align="center"><span lang="FA" dir="rtl" style="FONT-SIZE: 9pt; LINE-HEIGHT: 150%; FONT-FAMILY: Tahoma"><p> </p></span></p>
<p class="MsoNormal" style="LINE-HEIGHT: 150%; TEXT-ALIGN: center" align="center"><span lang="FA" dir="rtl" style="FONT-SIZE: 9pt; LINE-HEIGHT: 150%; FONT-FAMILY: Tahoma">جمعه ۲۱دی ۱۳۸۶</span></p></div>
                
                
            </div>
            
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        
        function updateIcon() {
            if (document.documentElement.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '☀️';
            } else {
                themeBtn.innerHTML = '🌙';
            }
        }
        
        updateIcon();
        
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            const isDark = document.documentElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        });
    </script>
    
        </body>
        </html>
