
        <!DOCTYPE html>
        <html lang="fa" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <title>قفسه‌نوشت ۱۹۹: پذیرفتن؛ از گروس عبدالملکیان | دلشــرم</title>
            <link rel="stylesheet" href="../style.css">
            
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    
        </head>
        <body>
            <div class="single-post-container">
                <div class="page-header" style="margin-bottom: 30px;">
                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button>
                    <h1><a href="../index.html" style="color: inherit; text-decoration: none;">دلشــرم</a></h1>
                    <p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;">محمدصادق رسولی</p>
                </div>
                <a href="../index.html" style="display: inline-block; margin-bottom: 20px; font-weight: bold;">← بازگشت به صفحه اصلی</a>
                <h2 style="border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 10px;">قفسه‌نوشت ۱۹۹: پذیرفتن؛ از گروس عبدالملکیان</h2>
                <div class="date" style="color: var(--text-muted); font-size: 0.9em; margin-bottom: 20px;">۱۱ فروردین ۱۴۰۱</div>
                <div><p style="text-align: center;"><span style="font-size:18px;"><img alt="" style="width: 298px; height: 435px;" src="https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1527488137l/25099715.jpg"></span></p>
<p style="text-align: center;"><span style="font-size:18px;">دست‌های هم را گرفته بودیم</span></p>
<p style="text-align: center;"><span style="font-size:18px;">تو در شب قدم می‌زدی</span></p>
<p style="text-align: center;"><span style="font-size:18px;">من </span></p>
<p style="text-align: center;"><span style="font-size:18px;">در تاریکی</span></p></div>
                <div class="post-tags"><strong>برچسب‌ها:</strong> <a href="../tags/قفسه‌نوشت.html">قفسه‌نوشت</a>، <a href="../tags/کتاب-شعر.html">کتاب-شعر</a></div>
                
            </div>
            
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        
        function updateIcon() {
            if (document.documentElement.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '☀️';
            } else {
                themeBtn.innerHTML = '🌙';
            }
        }
        
        updateIcon();
        
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            const isDark = document.documentElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        });
    </script>
    
        </body>
        </html>
