
        <!DOCTYPE html>
        <html lang="fa" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <title>نود و هشت | دلشــرم</title>
            <link rel="stylesheet" href="../style.css">
            
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    
        </head>
        <body>
            <div class="single-post-container">
                <div class="page-header" style="margin-bottom: 30px;">
                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button>
                    <h1><a href="../index.html" style="color: inherit; text-decoration: none;">دلشــرم</a></h1>
                    <p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;">محمدصادق رسولی</p>
                </div>
                <a href="../index.html" style="display: inline-block; margin-bottom: 20px; font-weight: bold;">← بازگشت به صفحه اصلی</a>
                <h2 style="border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 10px;">نود و هشت</h2>
                <div class="date" style="color: var(--text-muted); font-size: 0.9em; margin-bottom: 20px;">۲۹ اسفند ۱۳۹۸</div>
                <div><p><span style="font-family:Verdana,Geneva,sans-serif;"><span style="font-size:18px;">پارسال همین موقع این مطلب را گذاشته بودم. فکر می‌کنم هنوز موضوعیت داشته باشد:</span></span></p>
<p style="text-align: center;"><a href="http://delsharm.blog.ir/1397/12/29/y97"><span style="font-size:18px;"><span style="font-family:Verdana,Geneva,sans-serif;">http://delsharm.blog.ir/1397/12/29/y97</span></span></a></p>
<p style="text-align: center;"> </p></div>
                
                
            </div>
            
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        
        function updateIcon() {
            if (document.documentElement.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '☀️';
            } else {
                themeBtn.innerHTML = '🌙';
            }
        }
        
        updateIcon();
        
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            const isDark = document.documentElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        });
    </script>
    
        </body>
        </html>
