
        <!DOCTYPE html>
        <html lang="fa" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>— | دلشــرم</title>
            <link rel="stylesheet" href="../style.css?v=2">
            
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    
        </head>
        <body>
            <div class="single-post-container">
                <div class="page-header" style="margin-bottom: 30px;">
                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button>
                    <h1><a href="../index.html" style="color: inherit; text-decoration: none;">دلشــرم</a></h1>
                    <p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;">محمدصادق رسولی</p>
                </div>
                <a href="../index.html" style="display: inline-block; margin-bottom: 20px; font-weight: bold;">← بازگشت به صفحه اصلی</a>
                <h2 style="border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 10px;">—</h2>
                <div class="date" style="color: var(--text-muted); font-size: 0.9em; margin-bottom: 20px;">۰۶ خرداد ۱۳۸۶</div>
                <div class="post-content-body"><p align="center"><font >از این همه بودن<br>بی‌تو بودن <br>بی‌ تو در نبودن <br>از این همه نبودن<br>بدم می‌آید<br><br>مرا با خود در هر بود و نبودی ببــر<br>نگذار <br>سرنوشتم را بادها رقم بزنند<br><br>۱۹ اریبهشت ۱۳۸۶</font></p></div>
                <div style="color: var(--text-muted); font-size: 0.85em; margin-top: 40px; padding-top: 15px; border-top: 1px dashed var(--border-color);">تاریخ و زمان انتشار: ۰۶ خرداد ۱۳۸۶ ساعت ۱۶:۲۷</div>
                <div class="post-tags"><strong>برچسب‌ها:</strong> <a href="../tags/سیاه‌مشق.html">سیاه‌مشق</a></div>
                
            </div>
            
    <script>
        const themeBtn = document.getElementById('theme-toggle');
        
        function updateIcon() {
            if (document.documentElement.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '☀️';
            } else {
                themeBtn.innerHTML = '🌙';
            }
        }
        
        updateIcon();
        
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            const isDark = document.documentElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        });
    </script>
    
        </body>
        </html>
