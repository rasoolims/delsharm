<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>دلشرم - نوشته‌های بایگانی: تیر ۱۳۹۰</title><script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script><link rel="stylesheet" href="/delsharm/_astro/global.ntcYPbXE.css"></head><body><div class="container"><div class="page-header"><button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button><h1><a href="/delsharm/" style="color: inherit; text-decoration: none;">دلشرم</a></h1><p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;">محمدصادق رسولی</p></div><div class="main-layout"><div class="content-area"><div class="section-title" style="margin-top: 0; margin-bottom: 30px;">بایگانی: <span style="color: #2980b9;">تیر ۱۳۹۰</span></div><div class="posts-grid"><div class="post-card"><div class="card-content"><h2><a href="/delsharm/blog/سراب-نیست/">سراب نیست</a></h2><div class="meta-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;"><div class="date" style="margin-bottom: 0;">۲۰ تیر ۱۳۹۰</div><div class="comment-badge" style="font-size: 0.85em; color: #3498db; background: rgba(52, 152, 219, 0.1); padding: 2px 8px; border-radius: 12px; font-weight: bold;">💬 ۰ نظر</div></div><div class="excerpt-container"><p>این که دیده‌ای سراب نیست<br/>خواب آب نیست<br/>اشک‌های تشنه را دوباره پاک کن، ببین<br/>در کویر خشک ناسپاسی سپاه خصم<br/>جز هجوم کینه، هیچ ابر خواهشی<br/>روی خوش به ما نشان نداده است<br/> <br/>24 خرداد 1390</p></div><a href="/delsharm/blog/سراب-نیست/" class="read-more">ادامه مطلب ←</a></div></div></div></div></div></div><script>
        const themeBtn = document.getElementById('theme-toggle');
        function updateIcon() {
            if (document.documentElement.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '☀️';
            } else {
                themeBtn.innerHTML = '🌙';
            }
        }
        updateIcon();
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            const isDark = document.documentElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        });
    </script></body></html>
