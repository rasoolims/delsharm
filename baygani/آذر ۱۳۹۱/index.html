<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>دلشرم - نوشته‌های بایگانی: آذر ۱۳۹۱</title><script>

    </script><link rel="stylesheet" href="/delsharm/_astro/global.z7-hOiqs.css"></head><body><div class="container"><div class="page-header"><button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button><h1><a href="/delsharm/" style="color: inherit; text-decoration: none;">دلشرم</a></h1><p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;">محمدصادق رسولی</p></div><div class="main-layout"><div class="content-area"><div class="section-title" style="margin-top: 0; margin-bottom: 30px;">بایگانی: <span style="color: #2980b9;">آذر ۱۳۹۱</span></div><div class="posts-grid"><div class="post-card"><div class="card-content" style="display: flex; flex-direction: column; flex-grow: 1;"><h2><a href="/delsharm/blog/تقدیر-ناچار-منی/">تقدیر ناچار منی</a></h2><div class="meta-row" style="margin-bottom: 15px;"><div class="date" style="margin-bottom: 0;">۲۷ آذر ۱۳۹۱</div></div><div class="excerpt-container"><p>بیهوده<br/>کوشی مرگ!<br/>نامم<br/>فراموشی‌ست<br/>در دفتر دل می‌نویسم باز<br/>تقدیرِِ ناچارست کوچیدن...<br/>یاد<br/>و حسابش را<br/>باشد<br/>برای بعد!<br/>دوشنبه ۱۷ دسامبر ۲۰۱۲<br/>منهتن، نیویورک</p></div><!-- Notice the margin-top: auto; added here! --><div class="card-footer" style="display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 20px;"><a href="/delsharm/blog/تقدیر-ناچار-منی/" class="read-more" style="margin-top: 0;">ادامه مطلب ←</a><div class="comment-badge" style="font-size: 0.85em; color: #3498db; background: rgba(52, 152, 219, 0.1); padding: 2px 8px; border-radius: 12px; font-weight: bold;">💬 ۰ دیدگاه</div></div></div></div></div></div></div></div><script>
        const themeBtn = document.getElementById('theme-toggle');
        function updateIcon() {
            if (document.documentElement.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '☀️';
            } else {
                themeBtn.innerHTML = '🌙';
            }
        }
        updateIcon();
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            const isDark = document.documentElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        });
    </script></body></html>
