<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>دلشرم - نوشته‌های بایگانی: مهر ۱۳۹۸</title><script>

    </script><link rel="stylesheet" href="/delsharm/_astro/global.YV1wJ-kE.css"></head><body><div class="container"><div class="page-header"><button id="theme-toggle" class="theme-toggle-btn" aria-label="تغییر تم">🌙</button><h1><a href="/delsharm/" style="color: inherit; text-decoration: none;">دلشرم</a></h1><p style="color: var(--text-muted); margin-top: 10px; font-size: 1.1em;"><a href="/delsharm/about" style="text-decoration: underline; color: inherit;">محمدصادق رسولی</a></p></div><div class="main-layout"><div class="content-area"><div class="section-title" style="margin-top: 0; margin-bottom: 30px;">بایگانی: <span style="color: #2980b9;">مهر ۱۳۹۸</span></div><div class="posts-grid"><div class="post-card"><div class="card-content" style="display: flex; flex-direction: column; flex-grow: 1;"><h2><a href="/delsharm/blog/fb_pet/">موقت: سؤال در مورد فیس‌بوک</a></h2><div class="meta-row" style="margin-bottom: 15px;"><div class="date" style="margin-bottom: 0;">۱۵ مهر ۱۳۹۸</div></div><div class="excerpt-container"><p>ان‌شاءالله در چند ماه آینده، اگر عمری بود و فرصتی دست داد، از یک سال کار در فیس‌بوک می‌نویسم. اگر هنوز این وبلاگ را دنبال می‌کنید و دنبال نکاتی در مورد آنجا هستید، لطفاً در نظرات بنویسید.</p></div><!-- Notice the margin-top: auto; added here! --><div class="card-footer" style="display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 20px;"><a href="/delsharm/blog/fb_pet/" class="read-more" style="margin-top: 0;">ادامه مطلب ←</a><a href="/delsharm/blog/fb_pet/#comments-section" class="comment-badge" style="position: relative; z-index: 20; text-decoration: none; font-size: 0.85em; color: #3498db; background: rgba(52, 152, 219, 0.1); padding: 2px 8px; border-radius: 12px; font-weight: bold;">💬 ۲۰ دیدگاه</a></div></div></div></div></div></div></div><script>
        const themeBtn = document.getElementById('theme-toggle');
        function updateIcon() {
            if (document.documentElement.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '☀️';
            } else {
                themeBtn.innerHTML = '🌙';
            }
        }
        updateIcon();
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-mode');
            const isDark = document.documentElement.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        });
    </script></body></html>
