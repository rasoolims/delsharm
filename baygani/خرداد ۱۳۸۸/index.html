irection: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">که<br>عاشق از عیار افتاده در این عصر عیّاری</span><sup><span lang="FA" style="  "></span></sup><sup><span lang="FA" style=" "></span></sup></p><br><p dir="rtl" style="text-align: justify; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">دوباره<br>آرامی و نمی‌خروشی دریا! هان بخْروش! سکوت تو بوی فراموشی می‌دهد.</span></p><br><p dir="rtl" style="text-align: justify; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">موج‌هایت<br>را در کدامین ساحل جا گذاشته‌ای که بدین‌سان آرامی؟! کدام گوش‌ماهی دردِ دل‌هایت<br>را نشنیده گرفته است؟! نکند غم‌های کوچکم تو را بدین‌سان ملول کرده باشد. نکند<br>رودها دیگر سراغی از چشمت نمی‌گیرند. آی دریا! لب بر کدامین سنگ گزیده‌ای که چونان<br>سیلی‌خوردگانْ آرامْ در گوشه‌ای از مسیرِ نسیم غنوده‌ای؟!</span></p><br><p dir="rtl" style="text-align: justify; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">دریا؛<br>دیدی شکوه اساطیری آسمان با دلم چه کرد؟! دیدی فریادهایم بغض شد. فریادها را<br>گریستم. و حال این منم که چشمانم چند صباحی‌ست بوی جنون گرفته است.</span></p><br><p dir="rtl" style="text-align: justify; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">نامه‌هایم<br>را خواندی یا نه؟ تو را به عطر تمامی گل‌ها قسم داده بودم تا مرا با آسمان آشتی<br>دهی. آن نامه‌ها را آیا نامه‌رسانِ رود برایت آورده است؟ آن‌ها را به بوسه آغشتم<br>تا وقتی به لب‌هایت برسد؛ خواه‌ناخواه طعم بوسه‌هایم را برای لحظه‌ای شاید زیسته<br>باشی.</span></p><br><p dir="rtl" style="text-align: justify; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "><span> </span>این دیوانه هنوز هم منتظر پاسخ شگرفی از آسمان<br>است. می‌دانم؛ تو با سکوتت دردهایی را که در نامه‌هایم زیسته بودم، برای آسمان<br>خوانده‌ای. برایش بگو که این دیوانه دیگر این همه اندوه را احتمال‌کردن نَتْواند.</span></p><br><p align="center" dir="rtl" style="text-align: center; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  "></span></p><br><p align="right" dir="rtl" style="margin-left: 6pt; text-align: left; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="AR-SA" style="  ">ما ز دریاییم<br>و دریا می‌رویم</span><span lang="FA" style="  "></span></p><br><p dir="rtl" style="text-align: justify; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">دیوانه<br>این روزها گریستن را بسیار زیسته است و بسیارتَر اندوه را. می‌دانم، این دیوانهْ<br>خودْ نیز دریاست اگر اندوه را بسیارتَر از این‌ها بزیَد. ولی افسوس که تمام بودنش<br>را به قطره‌ای محال راضی کرده است.</span></p><br><p align="center" dir="rtl" style="text-align: center; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "><span> </span><span style=""></span></span></p><br><p align="right" dir="rtl" style="text-align: left; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">به<br>دریا گفتم، شبی راز دل</span></p><br><p align="right" dir="rtl" style="text-align: left; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">خروشید<br>از غم، زد سَر به سنگ ساحل</span></p><br><p dir="rtl" style="text-align: justify; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">مرا در<br>موج‌هایت نهان کن دریا. من نیز از تواَم. مرا چون اشکی در چشم‌هایت غرق کن.</span></p><br><p dir="rtl" style="text-align: justify; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">آی<br>دریا بخروش. آرامش تو بر ملال من می‌افزاید. بخروش.</span></p><br><p align="center" dir="rtl" style="margin-left: 12pt; text-align: center; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">چهارشنبه 20 خرداد 1388</span></p><br><p align="center" dir="rtl" style="margin-left: 6pt; text-align: center; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">ساحل سردآبْ‌رود-چالوس</span></p><br><p align="center" dir="rtl" style="margin-left: 6pt; text-align: center; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  "></span></p><br><p dir="rtl" style="text-align: justify; line-height: 12pt; page-break-after: avoid; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  "></span><span lang="FA" style=" ">بیتی<br>است از غزلی از استاد محمّدعلی بهمنی با مطلع: "</span><span lang="AR-SA" style=" ">لبت نه گوید و پیداست می گوید دلت<br>آری/که این‌سان دشمنی یعنی که خیلی دوستم داری" در کتاب «گاهی دلم برای خودم<br>تنگ می‌شود» نشر دارینوش.</span><span lang="AR-SA"></span></p><br></div></p></div><a href="/delsharm/blog/post_582/" class="read-more">ادامه مطلب ←</a></div></div><div class="post-card"><div class="card-content"><h2><a href="/delsharm/blog/post_583/">سیاه‌مشق ۷</a></h2><div class="date">۱۹ خرداد ۱۳۸۸</div><div class="excerpt-container"><p><div class="postbody"><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">از بازی سرنوشت بیزار شدیم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">از هر چه قشنگ و زشت بیزار شدیم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">آن قدر جهان پر شده است از شدّاد</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">ما از هوس بهشت بیزار شدیم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">دوشنبه 18 خرداد 1388</span></p><br></div></p></div><a href="/delsharm/blog/post_583/" class="read-more">ادامه مطلب ←</a></div></div><div class="post-card"><div class="card-content"><h2><a href="/delsharm/blog/post_584/">حرف دوم!</a></h2><div class="date">۱۶ خرداد ۱۳۸۸</div><div class="excerpt-container"><p><div class="postbody"><br><p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">تقدیم به عزیزی که برایم نوشت:</span></p><br><p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">"</span><span lang="FA" style="  ">آرامش حقیقی در جُستن<br>آن راه است</span><span lang="FA" style="  ">"</span><span lang="FA" style=" "></span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">قصدم غزلی بود که از قافیه افتاد</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">چون شعر نگاه تو فرو ریخت به رویم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">ای کاش که با لهجۀ سنگین نگاهی</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">می‌شد همۀ حرف دل خویش بگویم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">دریا همه‌اش در دل ما جای گرفته</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">افسوس که یک تُنگ فقط در نظر ماست</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">دیوار نگاهی‌ست که خود صاحب آنیم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">تکرار شدن، خاصیت سادۀ دنیاست</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">شد توشۀ اعمالْ پر از واژۀ عادت</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">عادی شده بر ما قفس تَنگ تغافل</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">حبسیم در این حجم قفس، سخت عجیب است</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">دانستن این رنج، ولی باز تعلّل</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">در ما نفسی پاک دمیده‌ست خداوند</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">صد آیۀ پاکی‌ست: همین آه! همین آه!</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">ما واژۀ لبریز خداییم که شاید</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">بیهوده کشیدیم دل خویش به بی‌راه</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">با آن که حقیریم ولی باز بزرگیم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">سهم دل ما نیست که بیهوده بمیریم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">پرواز همان واژۀ نابی‌ست که باید</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">از دست خداوند جهان باز بگیریم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">آرامش‌مان هم همه در جُستن راه‌ست</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">راهی که به صد واژۀ لبخند عجین است</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">لبخند زدن ساده‌ترین راز جهان‌ست</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">اسرار مگوی دو جهان نیز همین است</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">ما واژۀ دردیم که حیف است دل ما</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">در فاصله‌ها خسته و وامانده بماند</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">بگذار که با واژۀ زیبای رسیدن</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">این دل، غزلی تازه پر از عشق بخواند</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">جمعه 15 خرداد 1388</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  "></span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">پی‌نوشت:</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">شما خدای نخواسته روزهای سیاهی<br>را در پیش دارید؛ این‌طور که زمینه است، روزهای بدی خواهید دید. ایادی استعمار می‌خواهند<br>تمام حیثیات اسلام را از بین ببرند و شما باید در مقابل ایستادگی کنید؛ و با حب<br>نفس و حب جاه و کبر و غرور نمی‌توان مقاومت کرد. عالِم سوء، عالِم متوجه به دنیا،<br>عالمی که در فکر حفظ مسند و ریاست باشد، نمی‌تواند با دشمنان اسلام مبارزه نماید.<br>و ضررش از دیگران بیشتر است. قدم را الهی کنید، حب دنیا را از دل بیرون نمایید؛ آن<br>وقت می‌توانید مبارزه کنید. از هم‌اکنون این نکته را در قلب خود بپرورانید و تربیت<br>کنید که من باید یک سرباز مسلّح و اسلامی باشم و برای اسلام فدا شوم؛ من باید برای<br>اسلام کار کنم تا از بین بروم. برای خود بهانه درست نکنید که امروز مقتضی نیست.<br>کوشش کنید تا برای آتیۀ اسلام به درد بخورید و خلاصه، یک انسان باشید. ایادی<br>استعمار از انسان می‌ترسند؛ از آدم می‌ترسند. استعمارگران که می‌خواهند همه چیز را<br>به یغما ببرند، نمی‌گذارند در دانشگاه‌های دینی و علمی ما آدم تربیت شود. از آدم<br>می‌ترسند. اگر یک آدم در مملکتی پیدا شد، مزاحم آنان می‌شود و منافع آن‌ها را به<br>خطر می‌اندازد.</span></p><br><p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">جهاد اکبر یا مبارزه با نفس، صفحۀ 46، حضرت امام<br>خمینی</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  "></span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">ممکن است یک انقلاب و یک<br>نظام یک روز بمیرد. عامل مرگ و زندگی در یک انقلاب چیست؟ دو عامل وجود دارد که<br>خیلی مهم است: یکی شعارها و پرچم‌های برافراشتۀ یک انقلاب است؛ شعارها و هدف‌هایی<br>که یک انقلاب را ترسیم می‌کند. اگر عمر مفید این شعارها سر بیاید و انقلاب حرفی<br>برای گفتن نداشته باشد، زایل خواهد شد. البته این در مورد انقلاب اسلامی به هیچ<br>وجه صدق نمی‌کند. .... عامل دوم که ممکن است برای انقلاب مشکل درست کند، این است<br>که دست‌اندرکاران و صاحبان انقلاب –یعنی مردم و مسئولان- سست و خسته شوند و اشتباه<br>کنند و صلاحیت لازم را از دست بدهند. هر انقلاب و هر نظامی اگر به این آفت دچار<br>شود، نابود خواهد شد؛ این را همیشه باید به عنوان یک تهدید در نظر گرفت.</span></p><br><p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">بریده‌ای از بیانات آیت‌الله خامنه‌ای در دیدار<br>دانشجویان و دانش‌آموزان طرح ولایت 28/6/1381</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  "></span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">بگذارید بگویند حکومت<br>دیگری بعد از حکومت علی علیه‌السلام بود به نام حکومت خمینی که با هیچ ناحقی<br>نساخت، تا سرنگون شد. ما از سرنگونی نمی‌ترسیم، از انحراف می‌ترسیم.</span></p><br><p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">شهید پیچک</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">*</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">ما برای گریه و تماشای<br>غروب به دنیا نیامده‌ایم...</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">در توضیحات شناسنامۀ همۀ<br>ما نوشته‌اند:</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">"این دیوانه تا آمد<br>به دنیا خندید"</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">...</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">محکم باش مرد!</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">شوخی نکن عبدالحمید!</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">بی‌خیال غنی‌سازی<br>آزمایشگاهی و صنعتی</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">نمی‌گذاریم حتی یکی از<br>کلمه‌هامان را به گوانتانامو ببرند</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">آخر ما به زبانی نفس می‌کِشیم</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">که یکی از لغاتش عاشوراست</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">نه فارسی، نه عربی</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">به زبان ذوالفقار حیدر<br>کرار</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">به زبان خون مطهر حسین</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">...</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">خیالاتی شدند این‌ها</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">این‌جا صحنۀ بازی‌های<br>رایانه‌ای نیست</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">این‌جا ایران است...</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">چگونه؟</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">چگونه در برابر بیانیه‌های<br>شورای امنیت سجده کنیم؟</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">ما همانانیم که قرآن را<br>گرفتیم و بوسیدیم</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">امّا دستان مطلّای خلیفه‌ها<br>را بریدیم</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">...</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">قلمت را بردار</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">و از کبوترها بنویس</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">از ماسه‌های متبرک ساحل</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">ما برای گریه و تماشای<br>غروب به دنیا نیامده‌ایم</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">...</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">صبح نزدیک است</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">و امّت واحده باید طلوع<br>کند</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">قلمت را بردار و از چهرۀ<br>سرخ سیب‌های لبنان بخوان:</span></p><br><p dir="rtl" style="text-align: justify; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">"الا انَّ حزب الله<br>هُمُ الغالبون".</span></p><br><p align="right" dir="rtl" style="text-align: left; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">بریده‌ای از شعر "این آمریکا چیست؟"<br>سرودۀ علی‌محمّد مؤدب</span></p><br></div></p></div><a href="/delsharm/blog/post_584/" class="read-more">ادامه مطلب ←</a></div></div><div class="post-card"><div class="card-content"><h2><a href="/delsharm/blog/سیاه-مشق-6/">سیاه‌مشق ۶</a></h2><div class="date">۱۱ خرداد ۱۳۸۸</div><div class="excerpt-container"><p><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">چشم تو مرا برد به آن سوی سرودن</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">تا لحظۀ زیبای دل از خویش زدودن</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">آهنگ صدایت شده آرامش این دل</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">موسیقی لبخند تو شد معنی بودن</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  "> </span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">شاید نشود اسم تو را باز بخوانم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">از عشق تو، از لذّت آغاز بخوانم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">شاید نشود نامه‌ای از دل بنویسم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">از درد دلم، از غمِ این راز بخوانم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  "> </span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">شعرم همه مدیونِ نگاهی‌ست که داری</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">سرگشتۀ آن حضرت آهی‌ست که داری</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">دلگیر مشو از نفس سادۀ حرفم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">زیبایی تو اصلِ گناهی‌ست که داری</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  "> </span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">لبخند تو شعری‌ست که می‌شد بسرایم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">برق نگهت آیۀ دل بود برایم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">با آن که غم عشق تو دردی شده بر جان</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">تا درد تو باشی، همه دردی‌ست سزایم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  "> </span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">هر واژه به یاد نگهت در هیجان است</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">چون آتشی از کوه غَمَم در فوران است</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">من پای همهْ قول دلم مانده‌ام این بار</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">در هر نفس از سجده‌ام این قول عیان است</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  "> </span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">نگذار که تنها شوم و شعر بخوانم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">آوار شود این غم و در گریه بمانم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">نگذار که شعر دلم از یأس بمیرد</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">امّید بده بر دل دلمرده و جانم</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style=" "> </span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">دوشنبه 11 خرداد 1388</span></p><br><p align="center" style="text-align: center; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style=" "> </span></p><br><p align="center" style="text-align: center;"><span lang="FA" style="  " dir="rtl"></span><span style="  "></span></p><br><p style="text-align: right; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style="  ">پی‌نوشت:</span></p><br><p style="text-align: right; direction: rtl; unicode-bidi: embed;" dir="rtl"><span lang="FA" style=" ">انجمن ادبی «سیاه‌مشق» پس از تعطیلات عید با نام تازۀ «<a href="http://www.rasadesobh.blogfa.com/"><span style="text-decoration: none;">رَصَد صبح</span></a>» به کار خود ادامه می‌دهد؛ همین. </span></p></p></div><a href="/delsharm/blog/سیاه-مشق-6/" class="read-more">ادامه مطلب ←</a></div></div><div class="post-card"><div class="card-content"><h2><a href="/delsharm/blog/سیاه-مشق-5/">سیاه‌مشق ۵</a></h2><div class="date">۰۴ خرداد ۱۳۸۸</div><div class="excerpt-container"><p><style>/<![CDATA[/<br><!--<br> / Font Definitions /<br> @font-face<br> {<br> panose-1:2 11 6 4 3 5 4 4 2 4;<br> mso-font-charset:0;<br> mso-generic-<br> mso-font-pitch:variable;<br> mso-font-signature:1627421319 -2147483648 8 0 66047 0;}<br> / Style Definitions /<br> p.MsoNormal, li.MsoNormal, div.MsoNormal<br> {mso-style-parent:"";<br> margin:0cm;<br> margin-bottom:.0001pt;<br> mso-pagination:widow-orphan;</p></div><a href="/delsharm/blog/سیاه-مشق-5/" class="read-more">ادامه مطلب ←</a></div></div></div></div><div class="sidebar-area"><div class="section-title">موضوعات پرطرفدار</div><div class="tags-grid"><a href="/delsh
