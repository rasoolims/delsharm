FA" style="  ">سوگ‌سروده‌ای برای خودم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">شاید از اوّل هم می‌دانستی</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">من تنها مترسکی بوده‌ام</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">که کلاغ‌ها را به مذاکره می‌خواندم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span dir="ltr" style="  "><span>ð<span>ð<span>ð</span></span></span></span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">این روزها</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">دیگر دستم به دهانم نمی‌رسد</span></p><br><p align="center" dir="rtl" style="margin-right: 108pt; text-align: center; text-indent: 36pt; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">آسمان که سهل<br>است</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">وقتی باران اسیدی می‌بارد</span></p><br><p align="center" dir="rtl" style="margin-right: 36pt; text-align: center; text-indent: 72pt; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">بر تن زخمی شهر</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">نه نردبانی دارم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">و نه بالی</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">و مرغ همسایه هم تا بوده غاز بوده</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span dir="ltr" style="  "><span>ð<span>ð<span>ð</span></span></span></span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">من</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">شاید با اتوبوس‌های کندوان خو گرفته باشم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">با کوه‌هایی که کم‌کم دارند روس‌ها را از یاد می‌برند</span></p><br><p align="center" dir="rtl" style="margin-right: 180pt; text-align: center; text-indent: 36pt; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">-من که از کوه<br>بیشتر نیستم-</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span dir="ltr" style="  "><span>ð<span>ð<span>ð</span></span></span></span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">شاید تو هیچ وقت</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">دریا را با عینک دودی تماشا نکرده باشی</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">وقتی که چارقد مشکی تن می‌کند</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">و چشمان آبی‌اش را به آسمان پس می‌دهد</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">این روزها ماهیگیرها هم دیگر حوصلۀ چشم‌چرانی ندارند</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span dir= ه کرده‌اند</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span dir="ltr" style="  "><span>ð<span>ð<span>ð</span></span></span></span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">حالا عادت کرده‌ایم</span></p><br><p align="center" dir="rtl" style="margin-right: 72pt; text-align: center; text-indent: 36pt; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">که عادت داشته<br>باشیم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">مثل مترسکی</span></p><br><p align="center" dir="rtl" style="margin-right: 144pt; text-align: center; text-indent: 36pt; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">که کلاغ‌ها هم<br>جدّی‌شان نمی‌گیرند</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">جدّی جدّی مرده‌ایم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">و دل‌خوشیم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">که دارند سوراخ‌های اوزون را پر می‌کنند</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span dir="ltr" style="  "><span>ð<span>ð<span>ð</span></span></span></span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">این روزها</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">چشم‌های خستۀ ما</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">پیازها را هم جدّی نمی‌گیرند</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">تنها نشسته‌ایم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">که بیایند و نام مرغان دریایی‌مان را</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">در کتاب‌های‌شان ثبت کنند</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span dir="ltr" style="  "><span>ð<span>ð<span>ð</span></span></span></span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">دلم گرفته</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">فقط کمی آسمان برایم بفرست</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">سلام را به مرغان دریایی برسان</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">و بگو</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">این شاعر بدجوری خودش را به مردن</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">عادت داده است</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">شنبه 21 دی 1387</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  "> </span></p><br><p align=" center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">جز این دلیلی برای چشم‌انتظاری ندارم</span></p><p dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "><br/></span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">از خویشتن دل بریدم، پیوند از تو ندیدم</span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" ">امّا دریغا به جز تو، من کار و باری ندارم</span></p><p dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "><br/></span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style=" "> </span></p><br><p align="center" dir="rtl" style="text-align: center; direction: rtl; unicode-bidi: embed;"><span lang="FA" style="  ">عاشورا 1430 ه.ق.</span></p><br></div></p></div><a href="/delsharm/blog/post_591/" class="read-more">ادامه مطلب ←</a></div></div><div class="post-card"><div class="card-content"><h2><a href="/delsharm/blog/post_592/">سیاه‌مشق ۲</a></h2><div class="date">۰۴ دی ۱۳۸۷</div><div class="excerpt-container"><p><div class="postbody"><br><link href="file:///C:\DOCUME~1\user\LOCALS~1\Temp\msohtml1\01\clip_filelist.xml" rel="File-List"/><!--[if gte mso 9]><xml><br> <w:WordDocument><br>  <w:View>Normal</w:View><br>  <w:Zoom>0</w:Zoom><br>  <w:PunctuationKerning/><br>  <w:ValidateAgainstSchemas/><br>  <w:SaveIfXMLInvalid>false</w:SaveIfXMLInvalid><br>  <w:IgnoreMixedContent>false</w:IgnoreMixedContent><br>  <w:AlwaysShowPlaceholderText>false</w:AlwaysShowPlaceholderText><br>  <w:Compatibility><br>   <w:BreakWrappedTables/><br>   <w:SnapToGridInCell/><br>   <w:WrapTextWithPunct/><br>   <w:UseAsianBreakRules/><br>   <w:DontGrowAutofit/><br>  </w:Compatibility><br>  <w:BrowserLevel>MicrosoftInternetExplorer4</w:BrowserLevel><br> </w:WordDocument><br></xml><![endif]--><!--[if gte mso 9]><xml><br> <w:LatentStyles DefLockedState="false" LatentStyleCount="156"><br> </w:LatentStyles><br></xml><![endif]--><style>/<![CDATA[/<br><!--<br> / Font Definitions /<br> @font-face<br>	{<br>	panose-1:2 11 6 4 3 5 4 4 2 4;<br>	mso-font-charset:0;<br>	mso-generic-<br>	mso-font-pitch:variable;<br>	mso-font-signature:1627421319 -2147483648 8 0 66047 0;}<br> / Style Definitions /<br> p.MsoNormal, li.MsoNormal, div.MsoNormal<br>	{mso-style-parent:"";<br>	margin:0cm;<br>	margin-bottom:.0001pt;<br>	mso-pagination:widow-orphan;</p></div><a href="/delsharm/blog/post_592/" class="read-more">ادامه مطلب ←</a></div></div><div class="post-card"><div class="card-content"><h2><a href="/delsharm/blog/post_593/">سياه‌مشق ۱</a></h2><div class="date">۲۱ آذر ۱۳۸۷</div><div class="excerpt-container"><p><div class="postbody"><p align="center" dir="rtl">بگذر سکوت خود را محکوم تا ابد کن</p><br><p align="center" dir="rtl">تکرار واژه‌ها را با هر سکوت سد کن</p><br><p align="center" dir="rtl"> </p><br><p align="center" dir="rtl">از کوه‌ها بیاموز فریاد بی‌صدایی</p><br><p align="center" dir="rtl">خاموشی جهان را بر خویش گوش‌زد کن</p><br><p align="center" dir="rtl"> </p><br><p align="center" dir="rtl">با هر ستاره بنویس تاریک‌بودنت را</p><br><p align="center" dir="rtl">تو آسمان دل را هر لحظه‌ای رصد کن</p><br><p align="center" dir="rtl"> </p><br><p align="center" dir="rtl">بر باد رفت عمرت از دست معصیت‌ها</p><br><p align="center" dir="rtl">دزدان خویشتن را بی‌وقفه قطع ید کن</p><br><p align="center" dir="rtl"> </p><br><p align="center" dir="rtl">بیهوده رفت عمرت بس نیست بی‌قراری؟!</p><br><p align="center" dir="rtl">آغاز را بیاغاز خود را ز خویش رد کن</p><br><p align="center" dir="rtl"> </p><br><p align="center" dir="rtl">دریایی از گناهی مهتاب را بیاور</p><br><p align="center" dir="rtl">قدری ببار خود را، در خویش جزر و مد کن</p><br><p align="center" dir="rtl"> </p><br><p align="center" dir="rtl">ای اشک‌ها ببارید از داغ ناگزیرم</p><br><p align="center" dir="rtl">آه ای سکوت بشتاب آه ای خدا مدد کن</p><br><p align="center" dir="rtl"> </p><br><p align="center" dir="rtl">مهر 1387</p><br><p align="center" dir="rtl"> </p><br><p align="center"> </p></div></p></div><a href="/delsharm/blog/post_593/" class="read-more">ادامه مطلب ←</a></div></div><div class="post-card"><div class="card-content"><h2><a href="/delsharm/blog/unknown-74/">—</a></h2><div class="date">۱۸ شهریور ۱۳۸۷</div><div class="excerpt-container"><p><p align="center" dir="rtl"><font  > </font></p><br><p align="center" dir="rtl"><font  >در این دنیا</font></p><br><p align="center" dir="rtl"><font  >اگر نادان بمانی بهتر از آن‌ست</font></p><br><p align="center" dir="rtl"><font  >جواب پرسشت را با طناب دار بنویسند!</font></p><br><p align="center" dir="rtl"><font  ></font></p><br><p align="center" dir="rtl"><font  >شبیه ماهی لجباز</font></p><br><p align="center" dir="rtl"><font  >                                که تنها آرزویش بوسه‌ای بر گونۀ آب‌ست</font></p><br><p align="center" dir="rtl"><font  >به دنبال جوابش پرس‌پرسان</font></p><br><p align="center" dir="rtl"><font  >علامت‌های پرسش را </font></p><br><p align="center" dir="rtl"><font  >تکاپو می‌کند هر بار</font></p><br><p align="center" dir="rtl"><font  >گلوگیر و نفس‌گیر است</font></p><br><p align="center" dir="rtl"><font  >-مانند طنابِ دار-</font></p><br><p align="center" dir="rtl"><font  >                                  پاسخ‌های بی‌رحمی </font></p><br><p align="center" dir="rtl"><font  >                                                                                که می‌خیزد به ناگاه از علامت‌های بی‌پاسخ</font></p><br><p align="center" dir="rtl"><font  ></font></p><br><p align="center" dir="rtl"><font  >تو هم بگذر </font></p><br><p align="center" dir="rtl"><font  >سؤالت را </font></p><br><p align="center" dir="rtl"><font  >شبیه ماهیان با یک حباب سا
